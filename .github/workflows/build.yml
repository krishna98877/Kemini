name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle.kts', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        # Both API keys (Groq + Composio) have hardcoded defaults in the source
        # so the APK ships working out of the box. CI secrets override them if set.
        env:
          COMPOSIO_CONSUMER_KEY: ${{ secrets.COMPOSIO_CONSUMER_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stremini-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
