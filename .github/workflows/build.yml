name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle.kts', '**/gradle.properties') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Create local.properties with API keys from secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COMPOSIO_CONSUMER_KEY: ${{ secrets.COMPOSIO_CONSUMER_KEY }}
          AUTH_CONFIG_GITHUB: ${{ secrets.AUTH_CONFIG_GITHUB }}
          AUTH_CONFIG_GMAIL: ${{ secrets.AUTH_CONFIG_GMAIL }}
          AUTH_CONFIG_INSTAGRAM: ${{ secrets.AUTH_CONFIG_INSTAGRAM }}
          AUTH_CONFIG_FACEBOOK: ${{ secrets.AUTH_CONFIG_FACEBOOK }}
          AUTH_CONFIG_WHATSAPP: ${{ secrets.AUTH_CONFIG_WHATSAPP }}
          AUTH_CONFIG_GOOGLEDRIVE: ${{ secrets.AUTH_CONFIG_GOOGLEDRIVE }}
          AUTH_CONFIG_DISCORD: ${{ secrets.AUTH_CONFIG_DISCORD }}
          AUTH_CONFIG_LINKEDIN: ${{ secrets.AUTH_CONFIG_LINKEDIN }}
          AUTH_CONFIG_REDDIT: ${{ secrets.AUTH_CONFIG_REDDIT }}
          AUTH_CONFIG_GOOGLESHEETS: ${{ secrets.AUTH_CONFIG_GOOGLESHEETS }}
          AUTH_CONFIG_YOUTUBE: ${{ secrets.AUTH_CONFIG_YOUTUBE }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          INSTAGRAM_DEFAULT_PSID: ${{ secrets.INSTAGRAM_DEFAULT_PSID }}
        run: |
          # Build local.properties file from secrets
          > android/local.properties
          [ -n "$GROQ_API_KEY" ] && echo "groq.api.key=$GROQ_API_KEY" >> android/local.properties
          [ -n "$COMPOSIO_CONSUMER_KEY" ] && echo "composio.consumer.key=$COMPOSIO_CONSUMER_KEY" >> android/local.properties
          [ -n "$AUTH_CONFIG_GITHUB" ] && echo "auth.config.github=$AUTH_CONFIG_GITHUB" >> android/local.properties
          [ -n "$AUTH_CONFIG_GMAIL" ] && echo "auth.config.gmail=$AUTH_CONFIG_GMAIL" >> android/local.properties
          [ -n "$AUTH_CONFIG_INSTAGRAM" ] && echo "auth.config.instagram=$AUTH_CONFIG_INSTAGRAM" >> android/local.properties
          [ -n "$AUTH_CONFIG_FACEBOOK" ] && echo "auth.config.facebook=$AUTH_CONFIG_FACEBOOK" >> android/local.properties
          [ -n "$AUTH_CONFIG_WHATSAPP" ] && echo "auth.config.whatsapp=$AUTH_CONFIG_WHATSAPP" >> android/local.properties
          [ -n "$AUTH_CONFIG_GOOGLEDRIVE" ] && echo "auth.config.googledrive=$AUTH_CONFIG_GOOGLEDRIVE" >> android/local.properties
          [ -n "$AUTH_CONFIG_DISCORD" ] && echo "auth.config.discord=$AUTH_CONFIG_DISCORD" >> android/local.properties
          [ -n "$AUTH_CONFIG_LINKEDIN" ] && echo "auth.config.linkedin=$AUTH_CONFIG_LINKEDIN" >> android/local.properties
          [ -n "$AUTH_CONFIG_REDDIT" ] && echo "auth.config.reddit=$AUTH_CONFIG_REDDIT" >> android/local.properties
          [ -n "$AUTH_CONFIG_GOOGLESHEETS" ] && echo "auth.config.googlesheets=$AUTH_CONFIG_GOOGLESHEETS" >> android/local.properties
          [ -n "$AUTH_CONFIG_YOUTUBE" ] && echo "auth.config.youtube=$AUTH_CONFIG_YOUTUBE" >> android/local.properties
          [ -n "$WHATSAPP_PHONE_NUMBER_ID" ] && echo "whatsapp.phone.number.id=$WHATSAPP_PHONE_NUMBER_ID" >> android/local.properties
          [ -n "$INSTAGRAM_DEFAULT_PSID" ] && echo "instagram.default.psid=$INSTAGRAM_DEFAULT_PSID" >> android/local.properties
          echo "local.properties created with secrets"

      - name: Build APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: flutter build apk --release --dart-define=GROQ_API_KEY=$GROQ_API_KEY

      - name: Rename APK to stremini-final
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/stremini-final.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stremini-final
          path: build/app/outputs/flutter-apk/stremini-final.apk
          retention-days: 30

      - name: Report Build Status
        if: always()
        run: |
          echo "Build Status: ${{ job.status }}"
          echo "Build triggered by: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
